<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Submit Feedback – Smart Transport Feedback</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #f0f4ff 0%, #e8f0fe 50%, #f5f7fa 100%);
      min-height: 100vh;
      color: #1a1d24;
    }
    .header {
      background: linear-gradient(90deg, #1e3a5f 0%, #2563eb 100%);
      color: #fff;
      padding: 1rem 1.5rem;
      box-shadow: 0 2px 12px rgba(30, 58, 95, 0.25);
    }
    .header-inner { max-width: 720px; margin: 0 auto; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:.75rem; }
    .header h1 { margin: 0; font-size: 1.25rem; font-weight: 700; letter-spacing: -0.02em; }
    .header a { color: rgba(255,255,255,0.95); text-decoration:none; font-size:0.9rem; }
    .container { max-width: 720px; margin: 0 auto; padding: 1.5rem 1rem 2.5rem; }
    .card {
      background: #fff;
      border-radius: 14px;
      padding: 1.5rem;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04);
      border: 1px solid rgba(0,0,0,0.05);
    }
    h2 { margin: 0 0 0.5rem; font-size: 1.15rem; color: #1e3a5f; }
    .sub { margin: 0 0 1rem; color: #5f6368; font-size: 0.9rem; }
    label { display: block; margin-top: 0.75rem; font-weight: 600; font-size: 0.9rem; color:#3c4043; }
    input, textarea {
      width: 100%;
      padding: 0.7rem 0.9rem;
      margin-top: 0.3rem;
      font-family: inherit;
      font-size: 0.95rem;
      border-radius: 10px;
      border: 1px solid #dadce0;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
    }
    textarea { min-height: 110px; resize: vertical; }
    .row { display:flex; gap:1rem; flex-wrap:wrap; }
    .row .field { flex:1; min-width:160px; }
    .btn {
      margin-top: 1rem;
      padding: 0.65rem 1.35rem;
      background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
      color: #fff;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.95rem;
      box-shadow: 0 2px 8px rgba(37,99,235,0.35);
      transition: transform 0.05s, box-shadow 0.2s;
    }
    .btn:hover { box-shadow: 0 4px 12px rgba(37,99,235,0.4); }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.65; cursor: not-allowed; transform:none; box-shadow:none; }
    .result {
      margin-top: 1rem;
      padding: 0.9rem 1.1rem;
      border-radius: 10px;
      font-size: 0.95rem;
      line-height: 1.5;
      display:none;
    }
    .result.success { background: linear-gradient(135deg, #ecfdf5 0%, #d1fae5 100%); border: 1px solid #a7f3d0; color: #065f46; }
    .result.error { background: linear-gradient(135deg, #fef2f2 0%, #fee2e2 100%); border: 1px solid #fecaca; color: #991b1b; }
    .result strong { display:block; margin-bottom:0.25rem; }
    .issues { margin-top: 0.35rem; }
    .tag {
      display: inline-block;
      padding: 0.2rem 0.55rem;
      background: #e0e7ff;
      border-radius: 6px;
      margin: 0.15rem 0.15rem 0 0;
      font-size: 0.8rem;
      font-weight: 500;
      color: #3730a3;
    }
    code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 0.8rem;
      background: #f1f5f9;
      padding: 0.15rem 0.4rem;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="/demo">← Demo Home</a>
      <h1>Submit Feedback</h1>
    </div>
  </header>

  <div class="container">
    <div class="card">
      <h2>Submit feedback</h2>
      <p class="sub">Calls <code>POST /feedback</code>. Backend runs sentiment + multi‑label issue detection.</p>
      <form id="f">
        <label>Complaint</label>
        <textarea id="text" name="text" rows="4" placeholder="e.g. Bus was very late and seats were dirty. Driver was rude." required></textarea>
        <div class="row">
          <div class="field">
            <label>Latitude</label>
            <input type="number" id="lat" name="latitude" step="any" placeholder="e.g. 30.7333" required>
          </div>
          <div class="field">
            <label>Longitude</label>
            <input type="number" id="lon" name="longitude" step="any" placeholder="e.g. 76.7794" required>
          </div>
        </div>
        <button type="submit" id="btn" class="btn">Submit</button>
      </form>
      <div id="out" class="result"></div>
    </div>
  </div>

  <script>
    document.getElementById('f').onsubmit = function(e) {
      e.preventDefault();
      var btn = document.getElementById('btn');
      var out = document.getElementById('out');
      out.style.display = 'block';
      out.className = 'result';
      out.innerHTML = 'Submitting…';
      btn.disabled = true;
      fetch(window.location.origin + '/feedback', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          text: document.getElementById('text').value,
          latitude: parseFloat(document.getElementById('lat').value),
          longitude: parseFloat(document.getElementById('lon').value)
        })
      })
      .then(r => r.json())
      .then(d => {
        out.className = 'result success';
        out.innerHTML = '<strong>Submitted.</strong> Sentiment: <strong>' + (d.sentiment || '') + '</strong>. Issues: <span class="issues">' +
          (d.issues && d.issues.length ? d.issues.map(i => '<span class="tag">' + i + '</span>').join('') : 'None detected') + '</span>';
      })
      .catch(err => {
        out.className = 'result error';
        out.innerHTML = '<strong>Error</strong> ' + (err.message || 'Request failed');
      })
      .finally(function() { btn.disabled = false; });
    };
  </script>
</body>
</html>
